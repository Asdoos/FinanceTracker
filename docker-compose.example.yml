services:
  finance-tracker:
    image: anri04/finance-tracker:latest
    ports:
      - "3001:3001"
    volumes:
      - finance-data:/data
    environment:
      - DATABASE_PATH=/data/finance.db
    restart: unless-stopped

  # ── Optional: PostgreSQL ───────────────────────────────────────────────────
  # Uncomment the sections below to use PostgreSQL instead of SQLite.
  # Also set DATABASE_URL on the finance-tracker service and remove volumes.
  #
