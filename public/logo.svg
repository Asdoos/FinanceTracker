<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="28" fill="#0f172a"/>

  <!-- Chart bars -->
  <rect x="18" y="72" width="16" height="28" rx="4" fill="#3b82f6" opacity="0.5"/>
  <rect x="40" y="55" width="16" height="45" rx="4" fill="#3b82f6" opacity="0.7"/>
  <rect x="62" y="40" width="16" height="60" rx="4" fill="#3b82f6"/>

